on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build --if-present
      - name: Build backend
        working-directory: backend
        run: |
          npm ci
          npm run build --if-present

